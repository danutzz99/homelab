version: "3.8"

services:
  vault:
    image: hashicorp/vault:1.15
    container_name: vault
    restart: unless-stopped
    cap_add:
      - IPC_LOCK
    security_opt:
      - apparmor:unconfined
    ports:
      - "8200:8200"
    environment:
      VAULT_ADDR: http://127.0.0.1:8200
    command: sh -c "exec vault server -config=/vault/config/vault.hcl"
    volumes:
      - ${NFS_CONFIG_PATH}/vault/data:/vault/data
      - ${NFS_CONFIG_PATH}/vault/config:/vault/config

  tautulli:
    image: lscr.io/linuxserver/tautulli:latest
    container_name: tautulli
    restart: unless-stopped
    security_opt:
      - apparmor:unconfined
    environment:
      PUID: ""
      PGID: ""
      TZ: ""
    ports:
      - "8181:8181"
    volumes:
      - ${NFS_CONFIG_PATH}/tautulli:/config

  honeyauth:
    image: python:3.11-slim
    container_name: honeyauth
    restart: unless-stopped
    working_dir: /app
    command: sh -c "pip install --no-cache-dir flask requests gunicorn && exec gunicorn -w 4 -b 0.0.0.0:5000 app:app"
    environment:
      USERS: ""
      SECRET_KEY: ""
      WHITELIST_CIDRS: ""
      DISCORD_WEBHOOK_URL: ""
      CF_API_TOKEN: ""
      CF_ZONE_ID: ""
    ports:
      - "5000:5000"
    volumes:
      - ${NFS_CONFIG_PATH}/honeyauth:/app:ro
