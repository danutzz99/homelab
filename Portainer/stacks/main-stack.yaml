version: "3.8"

services:
  gluetun:
    image: qmcgaw/gluetun
    container_name: gluetun
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      - VPN_SERVICE_PROVIDER=airvpn
      - VPN_TYPE=wireguard
      - WIREGUARD_PRIVATE_KEY=${AIRVPN_WIREGUARD_PRIVATE_KEY:-}
      - WIREGUARD_PRESHARED_KEY=${AIRVPN_WIREGUARD_PRESHARED_KEY:-}
      - WIREGUARD_ADDRESSES=${AIRVPN_WIREGUARD_ADDRESSES:-}
      - FIREWALL_VPN_INPUT_PORTS=${AIRVPN_FORWARDED_PORTS:-}
    ports:
      - "8080:8080"
      - "6881:6881"
      - "6881:6881/udp"
    volumes:
      - /mnt/mainpool/configs/gluetun:/gluetun
    restart: unless-stopped

  deunhealth:
    image: qmcgaw/deunhealth
    container_name: deunhealth
    network_mode: "none"
    environment:
      - LOG_LEVEL=info
      - HEALTH_SERVER_ADDRESS=127.0.0.1:9999
      - TZ=${HOMELAB_TIMEZONE:-}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    restart: always

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    environment:
      - LOG_LEVEL=info
      - LOG_HTML=false
      - CAPTCHA_SOLVER=none
      - TZ=${HOMELAB_TIMEZONE:-}
    ports:
      - "8191:8191"
    restart: unless-stopped

  qbittorrent:
    image: linuxserver/qbittorrent:latest
    container_name: qbittorrent
    depends_on:
      - gluetun
    environment:
      - PUID=568
      - PGID=568
      - TZ=${HOMELAB_TIMEZONE:-}
      - WEBUI_PORT=8080
      - TORRENTING_PORT=${QBITTORRENT_TORRENTING_PORT:-}
    network_mode: service:gluetun
    volumes:
      - /mnt/mainpool/configs/qbittorrent:/config
      - /mnt/mainpool/media:/media
    restart: unless-stopped

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    environment:
      - PUID=568
      - PGID=568
      - TZ=${HOMELAB_TIMEZONE:-}
    volumes:
      - /mnt/mainpool/configs/prowlarr:/config
      - /mnt/mainpool/media:/media
    restart: unless-stopped
    ports:
      - "9696:9696"

  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    environment:
      - PUID=568
      - PGID=568
      - TZ=${HOMELAB_TIMEZONE:-}
    volumes:
      - /mnt/mainpool/configs/sonarr:/config
      - /mnt/mainpool/media:/media
    restart: unless-stopped
    ports:
      - "8989:8989"

  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    environment:
      - PUID=568
      - PGID=568
      - TZ=${HOMELAB_TIMEZONE:-}
    volumes:
      - /mnt/mainpool/configs/radarr:/config
      - /mnt/mainpool/media:/media
    restart: unless-stopped
    ports:
      - "7878:7878"

  bazarr:
    image: lscr.io/linuxserver/bazarr:latest
    container_name: bazarr
    environment:
      - PUID=568
      - PGID=568
      - TZ=${HOMELAB_TIMEZONE:-}
    volumes:
      - /mnt/mainpool/configs/bazarr:/config
      - /mnt/mainpool/media:/media
    restart: unless-stopped
    ports:
      - "6767:6767"

  profilarr:
    image: santiagosayshey/profilarr:latest
    container_name: profilarr
    environment:
      - TZ=${HOMELAB_TIMEZONE:-}
    volumes:
      - /mnt/mainpool/configs/profilarr:/config
    restart: unless-stopped
    ports:
      - "6868:6868"

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    command: tunnel --protocol http2 run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARED_TUNNEL_TOKEN:-}
    volumes:
      - /mnt/mainpool/configs/cloudflared:/etc/cloudflared
    restart: unless-stopped

  overseerr:
    image: lscr.io/linuxserver/overseerr:latest
    container_name: overseerr
    environment:
      - PUID=568
      - PGID=568
      - TZ=${HOMELAB_TIMEZONE:-}
    volumes:
      - /mnt/mainpool/configs/overseerr:/config
    ports:
      - "5055:5055"
    restart: unless-stopped

  watchtower:
    image: nickfedor/watchtower
    container_name: watchtower
    environment:
      TZ: "${HOMELAB_TIMEZONE:-}"
      WATCHTOWER_NOTIFICATIONS_HOSTNAME: "${WATCHTOWER_NOTIFICATIONS_HOSTNAME:-}"
      WATCHTOWER_CLEANUP: "true"
      WATCHTOWER_INCLUDE_STOPPED: "true"
      WATCHTOWER_SCHEDULE: "0 0 11 * * 1"
      WATCHTOWER_DISABLE_CONTAINERS: "ix*"
      WATCHTOWER_NOTIFICATION_URL: ${WATCHTOWER_NOTIFICATION_URL:-}
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  capacitarr:
    image: ghcr.io/ghent/capacitarr:stable
    container_name: capacitarr
    environment:
      - TZ=${HOMELAB_TIMEZONE:-}
      - PUID=568
      - PGID=568
      - JWT_SECRET=${CAPACITARR_JWT_SECRET:-}
    restart: unless-stopped
    ports:
      - "2187:2187"
    volumes:
      - /mnt/mainpool/configs/capacitarr:/config

  # recyclarr:
  #   image: ghcr.io/recyclarr/recyclarr
  #   container_name: recyclarr
  #   environment:
  #     - PUID=568
  #     - PGID=568
  #     - TZ=${HOMELAB_TIMEZONE:-}
  #   volumes:
  #     - /mnt/mainpool/configs/recyclarr:/config
  #   restart: unless-stopped
